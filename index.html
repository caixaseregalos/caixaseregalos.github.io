  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      /* Paleta de cores */
      --marrom-principal: #6B4F3A;
      --marrom-claro: #A67C52;
      --dourado-suave: #D4AF7F;
      --off-white: #F5F1EB;
      --rose-suave: #E8CFC4;

      /* Fontes */
      --fonte-titulo: 'Playfair Display', 'Cinzel', serif;
      --fonte-texto: 'Montserrat', 'Open Sans', sans-serif;
    }
    
    body {
      font-family: var(--fonte-texto);
      background: var(--off-white);
      margin: 0;
      padding: 40px 20px;
      text-align: center;
      color: var(--marrom-principal);
    }
    
    .logo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--dourado-suave);
      margin-bottom: 15px;
    }
    
    h1 {
      font-family: var(--fonte-titulo);
      font-size: 2em;
      color: var(--marrom-principal);
      margin-bottom: 5px;
    }

    .tagline {
      font-family: var(--fonte-titulo);
      font-style: italic;
      color: var(--marrom-claro);
      margin-bottom: 25px;
    }

    .descricao {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--fonte-texto);
      font-size: 1em;
      color: var(--marrom-principal);
      margin: 8px auto;
      max-width: 330px;
      text-align: center;
    }

    .descricao i {
      text-align: top;
      margin-right: 8px;
      color: var(--dourado-suave);
    }

    .botoes {
      margin-top: 30px;
    }

    a {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(45deg, var(--marrom-claro), var(--dourado-suave));
      color: var(--off-white);
      padding: 14px 20px;
      margin: 12px auto;
      width: 320px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 500;
      text-decoration: none;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    a:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 10px rgba(0,0,0,0.15);
    }

     a i {
      font-size: 18px;
    }

     a span {
      flex-grow: 1;
      text-align: left;
      margin-left: 12px;
    }

    a .seta {
      margin-left: auto;
      color: rgba(255, 255, 255, 0.9);
    }    
  </style>
</head>
